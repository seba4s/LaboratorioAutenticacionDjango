<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Calificación</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'calificaciones/styles.css' %}">
</head>
<body>
    <main class="wrapper">
    <section class="card narrow">
        <h1>Registrar Calificación</h1>
        <p>Complete los datos del estudiante y las tres notas correspondientes.</p>
        <hr>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="actions">
                <button type="submit" class="btn btn-success">Guardar registro</button>
                <a href="{% url 'listar' %}" class="btn btn-outline">Volver al listado</a>
            </div>
        </form>
    </section>
    </main>
</body>
</html>
