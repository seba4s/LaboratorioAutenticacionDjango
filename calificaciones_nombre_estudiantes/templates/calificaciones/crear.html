<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Calificación</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; max-width: 500px; }
        .btn-save { background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-cancel { color: #666; text-decoration: none; margin-left: 10px; }
        form p { margin-bottom: 15px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Registrar Calificación</h1>
        <p>Complete los datos del estudiante y las tres notas correspondientes.</p>
        <hr>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-save">Guardar Registro</button>
            <a href="{% url 'listar' %}" class="btn-cancel">Volver al listado</a>
        </form>
    </div>
</body>
</html>
