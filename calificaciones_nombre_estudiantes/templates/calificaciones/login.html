<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'calificaciones/styles.css' %}">
</head>
<body>
    <main class="wrapper">
    <section class="card narrow">
        <h1>Iniciar Sesion</h1>
        <p>Ingresa con tu cuenta de usuario (no superusuario).</p>
        <hr>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Entrar</button>
        </form>
        <p>
            No tienes cuenta?
            <a href="{% url 'registro_usuario' %}">Registrate aqui</a>
        </p>
    </section>
    </main>
</body>
</html>
