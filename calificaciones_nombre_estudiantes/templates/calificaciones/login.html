<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesion</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; max-width: 500px; }
        .btn-primary { background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-link { color: #007bff; text-decoration: none; }
        form p { margin-bottom: 15px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        .errorlist { color: #b00020; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Iniciar Sesion</h1>
        <p>Ingresa con tu cuenta de usuario (no superusuario).</p>
        <hr>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary">Entrar</button>
        </form>
        <p>
            No tienes cuenta?
            <a href="{% url 'registro_usuario' %}" class="btn-link">Registrate aqui</a>
        </p>
    </div>
</body>
</html>
