<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'calificaciones/styles.css' %}">
</head>
<body>
    <main class="wrapper">
    <section class="card narrow">
        <h1>Crear Cuenta</h1>
        <p>Registra un usuario normal para usar el modulo de calificaciones.</p>
        <hr>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">Registrarme</button>
        </form>
        <p>
            Ya tienes cuenta?
            <a href="{% url 'login_usuario' %}">Inicia sesion</a>
        </p>
    </section>
    </main>
</body>
</html>
